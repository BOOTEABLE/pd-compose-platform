version: '3.8'

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_DB: biblioteca
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d biblioteca"]
      interval: 5s
      timeout: 5s
      retries: 5

  books_service:
    build: ./books_services
    ports:
      - "5000:5000"
    volumes:
      - ./books_services:/app  
    environment:
      DB_HOST: db
      DB_NAME: biblioteca
      DB_USER: myuser
      DB_PASSWORD: mypassword
    depends_on:
      db:
        condition: service_healthy